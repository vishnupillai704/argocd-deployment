---
# Source: processor/templates/Deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  labels:
    app: processor
    namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: processor
  strategy:
    type: "RollingUpdate"
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: processor
    spec:
      containers:
        - name: processor
          image: vishnu981824/app1
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: 100Mi
              cpu: 100m
            limits:
              memory: 200Mi
              cpu: 200m
