
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: processor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/vishnupillai704/argocd-deployment.git
    targetRevision: main
    path: .
    directory:
      recurse: true
      include: dev/us/processor/processor-manifest/*
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  ignoreDifferences:
  - group: argoproj.io
    kind: Rollout
    jsonPointers:
    - /status
    - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    