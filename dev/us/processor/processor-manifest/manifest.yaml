---
# Source: processor/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: processor
  labels:
    app: processor
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: processor
---
# Source: processor/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  labels:
    app: processor
spec:
  replicas: 0
  selector:
    matchLabels:
      app: processor
  template:
    metadata:
      labels:
        app: processor
    spec: 
      terminationGracePeriodSeconds: 1
      containers:
      - name: processor
        image: processor:green
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
          limits:
            cpu: 200m
---
# Source: processor/templates/Rollout.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: processor
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
spec:
  replicas: 1
  selector:
    matchLabels:
      app: processor
  workloadRef:
    apiVersion: apps/v1
    kind: Deployment
    name: processor
  strategy:
    canary:
      canaryService: processor-canary
      stableService: processor
      steps:
        - setWeight: 30
        - pause: {}
        - setWeight: 50
        - pause: {}
      maxUnavailable: 0
      maxSurge: 1
